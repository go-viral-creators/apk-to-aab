name: APK to AAB Converter (Final Working)

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Direct URL of APK file'
        required: true
        type: string

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install bundletool & aapt2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sdkmanager "build-tools;34.0.0"
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
          gh release download --repo google/bundletool --pattern "bundletool-all-*.jar" --output bundletool.jar --clobber

      - name: Download APK with original filename
        id: download
        run: |
          url="${{ github.event.inputs.file_url }}"
          # Extract filename from URL (last part after /, remove query params)
          filename=$(basename "$url" | cut -d'?' -f1)
          # If no extension or wrong, default to input.apk
          if [[ -z "$filename" || "$filename" != *.apk ]]; then
            filename="input.apk"
          fi
          echo "Downloading as: $filename"
          wget -O "$filename" "$url" || { echo "Download failed"; exit 1; }
          echo "INPUT_FILE=$filename" >> $GITHUB_ENV
          echo "filename=$filename" >> $GITHUB_OUTPUT

      - name: Extract and AAPT2 Convert
        run: |
          input_file="${{ env.INPUT_FILE }}"
          unzip -o "$input_file" -d apk_contents
          aapt2 convert --output-format proto "$input_file" -o proto_app.zip
          unzip -o proto_app.zip -d proto_out/

      - name: Create AAB Structure
        run: |
          mkdir -p base/manifest base/dex base/res base/lib base/assets
          [ -f "proto_out/AndroidManifest.xml" ] && cp proto_out/AndroidManifest.xml base/manifest/
          [ -f "proto_out/resources.pb" ] && cp proto_out/resources.pb base/
          [ -d "proto_out/res" ] && cp -r proto_out/res base/
          cp apk_contents/*.dex base/dex/ 2>/dev/null || true
          [ -d "apk_contents/lib" ] && cp -r apk_contents/lib base/
          [ -d "apk_contents/assets" ] && cp -r apk_contents/assets base/
          cd base && zip -r ../module.zip ./* && cd ..

      - name: Build Final AAB
        id: build
        run: |
          input_file="${{ env.INPUT_FILE }}"
          base_name="${input_file%.*}"
          output_aab="${base_name}.aab"
          echo "Output: $output_aab"
          java -jar bundletool.jar build-bundle --modules=module.zip --output="$output_aab"
          echo "OUTPUT_FILE=$output_aab" >> $GITHUB_ENV
          echo "output_file=$output_aab" >> $GITHUB_OUTPUT

      - name: Verify AAB Integrity
        run: |
          java -jar bundletool.jar validate --bundle="${{ env.OUTPUT_FILE }}"
          echo "✅ Valid AAB"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: converted-aab
          path: ${{ env.OUTPUT_FILE }}
          archive: false

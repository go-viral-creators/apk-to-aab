name: APK to AAB Converter (Final Working)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Secure Download (API Method)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sdkmanager "build-tools;34.0.0"
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
          gh release download --repo google/bundletool --pattern "bundletool-all-*.jar" --output bundletool.jar
          gh release download v1 --repo go-viral-creators/apk-to-aab --pattern "app.apk" --clobber

      - name: Extract and AAPT2 Convert
        run: |
          # 1. Pehle APK ko unzip karke normal contents nikaalein
          unzip -o app.apk -d apk_contents
          
          # 2. AAPT2 se poori APK ko Proto format mein convert karein (Fix for Invalid Tag Error)
          # Isse Manifest aur Resources dono sahi format mein aa jayenge
          aapt2 convert --output-format proto app.apk -o proto_app.zip
          unzip -o proto_app.zip -d proto_out/

      - name: Create AAB Structure
        run: |
          mkdir -p base/manifest base/dex base/res base/lib base/assets
          
          # Manifest: Proto format wala copy karein (Ye zaroori hai)
          [ -f "proto_out/AndroidManifest.xml" ] && cp proto_out/AndroidManifest.xml base/manifest/
          
          # Resources: Proto format wale copy karein
          [ -f "proto_out/resources.pb" ] && cp proto_out/resources.pb base/
          [ -d "proto_out/res" ] && cp -r proto_out/res base/
          
          # Baki files normal extraction se copy karein
          cp apk_contents/*.dex base/dex/ 2>/dev/null || true
          [ -d "apk_contents/lib" ] && cp -r apk_contents/lib base/
          [ -d "apk_contents/assets" ] && cp -r apk_contents/assets base/
          
          # Zip module
          cd base && zip -r ../module.zip ./* && cd ..

      - name: Build Final AAB
        run: |
          # Ab bundletool ko sahi Proto format milega aur error nahi aayega
          java -jar bundletool.jar build-bundle --modules=module.zip --output=app.aab
      - name: Verify AAB Integrity
        run: |
          # Check if AAB is valid using bundletool
          java -jar bundletool.jar validate --bundle=app.aab
          echo "AAB is valid and healthy!"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-aab-file
          path: app.aab

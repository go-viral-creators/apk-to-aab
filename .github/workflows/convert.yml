name: APK to AAB Converter

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y apktool wget zip unzip

      - name: Download bundletool
        run: |
          wget https://github.com/google/bundletool/releases/download/1.17.2/bundletool-all-1.17.2.jar
          mv bundletool-all-1.17.2.jar bundletool.jar

      - name: Download APK
        run: |
          wget -O app.apk https://github.com/go-viral-creators/apk-to-aab/releases/download/v1/app.apk

      - name: Show files
        run: |
          ls -lh

      - name: Decode APK
        run: |
          apktool d app.apk -o project
      - name: Decode APK
        run: |
          [span_2](start_span)apktool d app.apk -o project[span_2](end_span)

      - name: Fix Invalid Filenames
        run: |
          # Find all files starting with $ in the res directory and rename them
          find project/res -name "$*" -type f | while read file; do
            new_name=$(echo "$file" | sed 's/\$//g')
            mv "$file" "$new_name"
            echo "Renamed $file to $new_name"
          done

      - name: Rebuild APK
        run: |
          [span_3](start_span)apktool b project -o rebuilt.apk[span_3](end_span)
          
      - name: Rebuild APK
        run: |
          apktool b project -o rebuilt.apk

      - name: Create Bundle Module
        run: |
          mkdir base
          cp rebuilt.apk base/base.apk
          zip -r base.zip base

      - name: Build AAB
        run: |
          java -jar bundletool.jar build-bundle \
          --modules=base.zip \
          --output=app.aab

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: app.aab

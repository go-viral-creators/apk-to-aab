name: APK to AAB Converter (Working)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install AAPT2 & Build Tools
        run: |
          sdkmanager "build-tools;34.0.0"
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

            - name: Download APK & Tools
        run: |
          # -L flag redirect handle karne ke liye zaroori hai
          curl -L -o app.apk "https://github.com"
          curl -L -o bundletool.jar "https://github.com"
          
          # Check karo ki file download hui ya nahi
          ls -lh app.apk
          file app.apk

      - name: Extract APK Contents
        run: |
          # Agar file corrupted hai to ye step fail hone se pehle check karega
          if unzip -t app.apk; then
            unzip -o app.apk -d apk_contents
          else
            echo "Error: Downloaded APK is corrupted or not a valid zip file."
            exit 1
          fi


      - name: Convert APK to Proto Format (AAPT2)
        run: |
          # AAPT2 direct APK ko convert karega taaki resources.pb mil sake
          aapt2 convert --output-format proto app.apk -o converted_resources.zip
          unzip -o converted_resources.zip -d proto_out/
          # resources.pb ko main root mein move karein
          if [ -f "proto_out/resources.pb" ]; then
            cp proto_out/resources.pb ./resources.pb
            echo "Resources converted successfully."
          fi

      - name: Create AAB Structure
        run: |
          mkdir -p base/manifest base/dex base/root base/res base/lib base/assets
          
          # Manifest and Resources
          if [ -f "apk_contents/AndroidManifest.xml" ]; then
            cp apk_contents/AndroidManifest.xml base/manifest/
          fi
          
          # Copying other components
          cp apk_contents/*.dex base/dex/ 2>/dev/null || true
          [ -d "apk_contents/res" ] && cp -r apk_contents/res base/
          [ -d "apk_contents/lib" ] && cp -r apk_contents/lib base/
          [ -d "apk_contents/assets" ] && cp -r apk_contents/assets base/
          
          # IMPORTANT: Bundletool expects resources.pb in the module root
          [ -f "resources.pb" ] && cp resources.pb base/
          
          echo "Base directory structure check:"
          ls -R base | head -n 20

      - name: Create Module ZIP
        run: |
          cd base && zip -r ../module.zip ./* && cd ..

      - name: Build AAB
        run: |
          java -jar bundletool.jar build-bundle \
            --modules=module.zip \
            --output=app.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: app.aab

name: APK to AAB Converter

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install basic tools
        run: |
          sudo apt update
          sudo apt install -y wget unzip

      - name: Download APK
        run: |
          wget -O app.apk https://github.com/go-viral-creators/apk-to-aab/releases/download/v1/app.apk

      - name: Download APK2AAB
        run: |
          # Use the latest release; adjust version/URL if needed
          wget -O APK2AAB.jar https://github.com/REAndroid/APK2AAB/releases/download/v1.0.0/APK2AAB.jar

      - name: Convert APK to AAB
        run: |
          java -jar APK2AAB.jar -i app.apk -o app.aab

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: app.aab

   name: APK to AAB Converter (Manual Method)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Required Tools
        run: |
          sudo apt update
          sudo apt install -y wget unzip zip aapt2 xmlstarlet

      - name: Download APK
        run: |
          wget -O app.apk https://github.com/go-viral-creators/apk-to-aab/releases/download/v1/app.apk

      - name: Download Apktool
        run: |
          wget -O apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar

      - name: Download Bundletool
        run: |
          wget -O bundletool.jar https://github.com/google/bundletool/releases/download/1.17.2/bundletool-all-1.17.2.jar

      # Extract APK using apktool (keeping dex files with -s flag)
      - name: Decode APK (keep dex)
        run: |
          java -jar apktool.jar d app.apk -s -o decompile -f

      # Get manifest values using aapt2
      - name: Extract Manifest Values
        id: manifest
        run: |
          # Dump manifest in human-readable format
          aapt2 dump manifest decompile/AndroidManifest.xml > manifest.txt
          # Extract values
          minSdk=$(grep -oP 'minSdk:\K\d+' manifest.txt || echo "1")
          targetSdk=$(grep -oP 'targetSdk:\K\d+' manifest.txt || echo "1")
          versionCode=$(grep -oP 'versionCode:\K\d+' manifest.txt || echo "1")
          versionName=$(grep -oP "versionName:'\K[^']+" manifest.txt || echo "1.0")
          echo "minSdk=$minSdk" >> $GITHUB_OUTPUT
          echo "targetSdk=$targetSdk" >> $GITHUB_OUTPUT
          echo "versionCode=$versionCode" >> $GITHUB_OUTPUT
          echo "versionName=$versionName" >> $GITHUB_OUTPUT

      # Download android.jar for the target SDK from Google's Maven
      - name: Download android.jar
        run: |
          targetSdk="${{ steps.manifest.outputs.targetSdk }}"
          # If targetSdk not found, default to 30
          if [ -z "$targetSdk" ] || [ "$targetSdk" = "1" ]; then
            targetSdk=30
          fi
          wget -O android.jar https://dl.google.com/android/maven2/android/platforms/android-${targetSdk}/android.jar || \
          wget -O android.jar https://dl.google.com/android/repository/android-${targetSdk}/android.jar

      # Compile resources with aapt2
      - name: Compile Resources
        run: |
          aapt2 compile --dir decompile/res -o res.zip

      # Link resources to create base.zip (proto format)
      - name: Link Resources
        run: |
          aapt2 link --proto-format -o base.zip \
            -I android.jar \
            --manifest decompile/AndroidManifest.xml \
            --min-sdk-version ${{ steps.manifest.outputs.minSdk }} \
            --target-sdk-version ${{ steps.manifest.outputs.targetSdk }} \
            --version-code ${{ steps.manifest.outputs.versionCode }} \
            --version-name "${{ steps.manifest.outputs.versionName }}" \
            -R res.zip \
            --auto-add-overlay

      # Prepare the base module directory
      - name: Prepare Base Module
        run: |
          # Unzip the base.zip (contains resources.pb, manifest, res, etc.)
          unzip base.zip -d base_module
          # Create dex directory
          mkdir -p base_module/dex
          # Copy all dex files from decompile/
          cp decompile/*.dex base_module/dex/ 2>/dev/null || true
          # Copy lib and assets if they exist
          if [ -d decompile/lib ]; then cp -r decompile/lib base_module/; fi
          if [ -d decompile/assets ]; then cp -r decompile/assets base_module/; fi
          # Any other root files? The base_module/root/ already exists from base.zip
          # Ensure resources.pb is in root/ (it already is from base.zip)

      # Create the final base.zip
      - name: Create Final Module ZIP
        run: |
          cd base_module
          zip -r ../final_base.zip ./*
          cd ..

      # Build AAB with bundletool
      - name: Build AAB
        run: |
          java -jar bundletool.jar build-bundle \
            --modules=final_base.zip \
            --output=app.aab

      # Upload the AAB
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: app.aab       # Extract browser_download_url for the first asset ending with .jar
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' | head -1)
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "No JAR asset found in latest release."
            exit 1
          fi
          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "Found APK2AAB JAR: $DOWNLOAD_URL"

      - name: Download APK2AAB (if available)
        if: steps.apk2aab.outcome == 'success'
        run: |
          wget -O APK2AAB.jar "${{ steps.apk2aab.outputs.url }}"

      - name: Convert using APK2AAB
        if: steps.apk2aab.outcome == 'success'
        run: |
          java -jar APK2AAB.jar -i app.apk -o app.aab

      - name: Upload AAB Artifact (APK2AAB)
        if: steps.apk2aab.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: app.aab

      # ----- FALLBACK METHOD (if APK2AAB fails) -----
      - name: Install fallback tools (aapt2, apktool, d8)
        if: steps.apk2aab.outcome != 'success'
        run: |
          sudo apt install -y aapt2
          wget -O apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar
          # Download d8 (part of Android build tools) â€“ we'll use a small wrapper
          wget -O d8.zip https://dl.google.com/android/repository/build-tools_r34-linux.zip
          unzip d8.zip -d build-tools
          find build-tools -name d8 -exec chmod +x {} \;
          echo "$(pwd)/build-tools/linux" >> $GITHUB_PATH

      - name: Decode APK with apktool
        if: steps.apk2aab.outcome != 'success'
        run: |
          java -jar apktool.jar d app.apk -o project

      - name: Rebuild APK using aapt2
        if: steps.apk2aab.outcome != 'success'
        run: |
          java -jar apktool.jar b project --use-aapt2 -o rebuilt.apk

      - name: Extract rebuilt APK
        if: steps.apk2aab.outcome != 'success'
        run: |
          unzip rebuilt.apk -d apk_contents

      - name: Convert resources.arsc to protobuf (resources.pb)
        if: steps.apk2aab.outcome != 'success'
        run: |
          # aapt2 can convert the binary resource table to protobuf
          aapt2 convert --output-format proto apk_contents/resources.arsc -o resources.pb

      - name: Assemble base module directory
        if: steps.apk2aab.outcome != 'success'
        run: |
          mkdir -p base/manifest base/dex base/res base/root base/lib base/assets
          # Manifest
          cp apk_contents/AndroidManifest.xml base/manifest/
          # Dex files
          cp apk_contents/*.dex base/dex/ 2>/dev/null || true
          # Resources and assets
          cp -r apk_contents/res base/ 2>/dev/null || true
          cp -r apk_contents/lib base/ 2>/dev/null || true
          cp -r apk_contents/assets base/ 2>/dev/null || true
          # Place converted resources.pb in root/
          cp resources.pb base/root/
          # Handle any other root files (e.g., unknown)
          for f in apk_contents/*; do
            basef=$(basename "$f")
            if [ ! -d "$f" ] && [ "$basef" != "AndroidManifest.xml" ] && [[ ! "$basef" == *.dex ]] && [ "$basef" != "resources.arsc" ]; then
              cp "$f" base/root/
            fi
          done

      - name: Create module ZIP
        if: steps.apk2aab.outcome != 'success'
        run: |
          cd base && zip -r ../base.zip *

      - name: Download bundletool
        if: steps.apk2aab.outcome != 'success'
        run: |
          wget -O bundletool.jar https://github.com/google/bundletool/releases/download/1.17.2/bundletool-all-1.17.2.jar

      - name: Build AAB with bundletool
        if: steps.apk2aab.outcome != 'success'
        run: |
          java -jar bundletool.jar build-bundle --modules=base.zip --output=app.aab

      - name: Upload AAB Artifact (Fallback)
        if: steps.apk2aab.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: app.aab

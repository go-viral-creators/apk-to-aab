name: APK to AAB Converter (Debug Mode)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download and Debug Files
        run: |
          # AAPT2 Setup
          sdkmanager "build-tools;34.0.0"
          echo "$ANDROID_HOME/build-tools;34.0.0" >> $GITHUB_PATH
          
          echo "--- STARTING DOWNLOADS ---"
          
          # Bundletool download (Fixed URL)
          curl -L -o bundletool.jar "https://github.com"
          
          # APK Download (Explicit Headers ke saath)
          URL="https://github.com"
          curl -L -H "User-Agent: Mozilla/5.0" -H "Accept: application/octet-stream" -o app.apk "$URL"
          
          echo "--- DEBUG INFO ---"
          echo "File Size Info:"
          ls -lh app.apk bundletool.jar
          
          echo "File Type Check:"
          file app.apk
          file bundletool.jar
          
          echo "File Content Preview (First 5 lines):"
          head -n 5 app.apk | cut -c1-100
          
          # Agar file 'PK' se start nahi ho rahi, matlab wo ZIP/APK nahi hai
          if [[ $(head -c 2 app.apk) != "PK" ]]; then
            echo "ERROR: app.apk is NOT a valid ZIP/APK file (HTML detect hua hai)."
            exit 1
          fi

      - name: Process and Convert
        run: |
          # Extract and Convert
          unzip -o app.apk -d apk_contents
          aapt2 convert --output-format proto app.apk -o converted_resources.zip
          unzip -o converted_resources.zip -d proto_out/
          cp proto_out/resources.pb ./resources.pb

      - name: Build AAB Structure
        run: |
          mkdir -p base/manifest base/dex base/res base/lib base/assets
          [ -f "apk_contents/AndroidManifest.xml" ] && cp apk_contents/AndroidManifest.xml base/manifest/
          cp apk_contents/*.dex base/dex/ 2>/dev/null || true
          [ -d "apk_contents/res" ] && cp -r apk_contents/res base/
          [ -d "apk_contents/lib" ] && cp -r apk_contents/lib base/
          [ -d "apk_contents/assets" ] && cp -r apk_contents/assets base/
          [ -f "resources.pb" ] && cp resources.pb base/
          
          # Zip and Build
          cd base && zip -r ../module.zip ./* && cd ..
          java -jar bundletool.jar build-bundle --modules=module.zip --output=app.aab

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: converted-aab
          path: app.aab

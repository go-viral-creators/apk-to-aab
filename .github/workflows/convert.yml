name: APK to AAB Converter

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y apktool wget zip unzip

      - name: Download bundletool
        run: |
          wget https://github.com/google/bundletool/releases/download/1.17.2/bundletool-all-1.17.2.jar
          mv bundletool-all-1.17.2.jar bundletool.jar

      - name: Download APK
        run: |
          wget -O app.apk https://github.com/go-viral-creators/apk-to-aab/releases/download/v1/app.apk

      - name: Decode APK
        run: |
          apktool d app.apk -o project

      - name: Fix Resource Names and References
        run: |
          echo "Cleaning up invalid characters in filenames..."
          # Sabhi files jinme $ hai unhe rename karna
          find project/res -name "*$*" -type f | while read file; do
            new_name=$(echo "$file" | sed 's/\$//g')
            mv "$file" "$new_name"
          done
          
          echo "Updating XML references..."
          # XML files ke andar jahan purane naam ($ waale) use hue hain unhe theek karna
          # Hum sirf resources ke andar check kar rahe hain
          find project/res -type f -name "*.xml" -print0 | xargs -0 sed -i 's/@drawable\/\$/@drawable\//g' || true
          find project/res -type f -name "*.xml" -print0 | xargs -0 sed -i 's/drawable\/\$/drawable\//g' || true

      - name: Rebuild APK
        run: |
          # --copy-force ensures we try to build even if there are minor issues
          apktool b project -o rebuilt.apk

      - name: Create Bundle Module
        run: |
          mkdir -p base
          cp rebuilt.apk base/base.apk
          zip -r base.zip base

      - name: Build AAB
        run: |
          java -jar bundletool.jar build-bundle \
          --modules=base.zip \
          --output=app.aab

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: app.aab

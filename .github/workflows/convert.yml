name: APK to AAB Converter (Fixed)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install AAPT2 & Tools
        run: |
          # Build tools install aur PATH set up
          sdkmanager "build-tools;34.0.0"
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
          
          # Tools download using curl -L (Robust method)
          curl -L -o app.apk "https://github.com"
          curl -L -o bundletool.jar "https://github.com"
          
          # Check if APK is valid
          file app.apk

      - name: Extract APK and Convert to Proto
        run: |
          # APK contents extract karein
          unzip -o app.apk -d apk_contents
          
          # AAPT2 se resources.pb generate karein
          aapt2 convert --output-format proto app.apk -o converted_resources.zip
          unzip -o converted_resources.zip -d proto_out/
          
          if [ -f "proto_out/resources.pb" ]; then
            cp proto_out/resources.pb ./resources.pb
            echo "AAPT2 conversion successful."
          fi

      - name: Create AAB Structure
        run: |
          mkdir -p base/manifest base/dex base/res base/lib base/assets
          
          # Essential files copy karein
          [ -f "apk_contents/AndroidManifest.xml" ] && cp apk_contents/AndroidManifest.xml base/manifest/
          cp apk_contents/*.dex base/dex/ 2>/dev/null || true
          [ -d "apk_contents/res" ] && cp -r apk_contents/res base/
          [ -d "apk_contents/lib" ] && cp -r apk_contents/lib base/
          [ -d "apk_contents/assets" ] && cp -r apk_contents/assets base/
          
          # Resources.pb ko root mein rakhna bundletool ke liye zaruri hai
          [ -f "resources.pb" ] && cp resources.pb base/
          
          echo "Final Structure Check:"
          ls -R base | head -n 20

      - name: Build Final AAB
        run: |
          # Base directory ko zip karke bundletool se AAB banayein
          cd base && zip -r ../module.zip ./* && cd ..
          java -jar bundletool.jar build-bundle --modules=module.zip --output=app.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: converted-app-aab
          path: app.aab

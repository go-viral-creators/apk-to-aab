name: APK to AAB Converter

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget zip unzip

      - name: Download bundletool
        run: |
          wget https://github.com/google/bundletool/releases/download/1.17.2/bundletool-all-1.17.2.jar
          mv bundletool-all-1.17.2.jar bundletool.jar

      - name: Download APK
        run: |
          wget -O app.apk https://github.com/go-viral-creators/apk-to-aab/releases/download/v1/app.apk

      - name: Prepare base module
        run: |
          mkdir -p base
          cp app.apk base/base.apk
          cd base && zip -r ../base.zip .

      - name: Build AAB
        run: |
          java -jar bundletool.jar build-bundle \
            --modules=base.zip \
            --output=app.aab

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: app.aab

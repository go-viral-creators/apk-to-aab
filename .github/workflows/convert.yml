name: APK to AAB Converter (Final Protocol)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Secure Download (API Method)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. AAPT2 Path Setup
          sdkmanager "build-tools;34.0.0"
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
          
          # 2. Bundletool Download (Official GitHub CLI Method)
          # Isse HTML download hone ka khatra 0% hai
          gh release download --repo google/bundletool --pattern "bundletool-all-*.jar" --output bundletool.jar
          
          # 3. APK Download (Aapki Repo se)
          # Agar 'v1' tag hai, toh ye sahi file uthayega
          gh release download v1 --repo go-viral-creators/apk-to-aab --pattern "app.apk" --clobber
          
          # Final Verification
          echo "--- Verification ---"
          ls -lh app.apk bundletool.jar
          file app.apk
          file bundletool.jar

      - name: Extract and AAPT2 Convert
        run: |
          # APK contents extract karein
          unzip -o app.apk -d apk_contents
          
          # AAPT2 convert (APK to Proto)
          aapt2 convert --output-format proto app.apk -o converted_resources.zip
          unzip -o converted_resources.zip -d proto_out/
          cp proto_out/resources.pb ./resources.pb

      - name: Create AAB Structure
        run: |
          mkdir -p base/manifest base/dex base/res base/lib base/assets
          
          # Resources and Manifest
          [ -f "apk_contents/AndroidManifest.xml" ] && cp apk_contents/AndroidManifest.xml base/manifest/
          cp apk_contents/*.dex base/dex/ 2>/dev/null || true
          [ -d "apk_contents/res" ] && cp -r apk_contents/res base/
          [ -d "apk_contents/lib" ] && cp -r apk_contents/lib base/
          [ -d "apk_contents/assets" ] && cp -r apk_contents/assets base/
          [ -f "resources.pb" ] && cp resources.pb base/
          
          # ZIP module for bundletool
          cd base && zip -r ../module.zip ./* && cd ..

      - name: Build Final AAB
        run: |
          # Is bar bundletool valid jar hoga toh error nahi aayega
          java -jar bundletool.jar build-bundle --modules=module.zip --output=app.aab

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-aab-file
          path: app.aab

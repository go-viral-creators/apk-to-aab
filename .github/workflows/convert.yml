name: APK to AAB Converter (Final Working)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install AAPT2 & Tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # AAPT2 Setup
          sdkmanager "build-tools;34.0.0"
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
          
          # Bundletool download (Using gh for reliability)
          gh release download --repo google/bundletool --pattern "bundletool-all-1.17.2.jar" --output bundletool.jar
          
          # APK Download (Using gh for your repo)
          gh release download v1 --repo go-viral-creators/apk-to-aab --pattern "app.apk" --clobber
          
          # Debug: File check (Ab size sahi dikhayega)
          ls -lh bundletool.jar app.apk

      - name: Process Resources and Convert
        run: |
          # APK Extract
          unzip -o app.apk -d apk_contents
          
          # AAPT2 Conversion
          aapt2 convert --output-format proto app.apk -o converted_resources.zip
          unzip -o converted_resources.zip -d proto_out/
          cp proto_out/resources.pb ./resources.pb

      - name: Create AAB Structure
        run: |
          mkdir -p base/manifest base/dex base/res base/lib base/assets
          
          # Files Copying
          [ -f "apk_contents/AndroidManifest.xml" ] && cp apk_contents/AndroidManifest.xml base/manifest/
          cp apk_contents/*.dex base/dex/ 2>/dev/null || true
          [ -d "apk_contents/res" ] && cp -r apk_contents/res base/
          [ -d "apk_contents/lib" ] && cp -r apk_contents/lib base/
          [ -d "apk_contents/assets" ] && cp -r apk_contents/assets base/
          [ -f "resources.pb" ] && cp resources.pb base/
          
          # Zip Module
          cd base && zip -r ../module.zip ./* && cd ..

      - name: Build Final AAB
        run: |
          # Ab bundletool sahi chalega
          java -jar bundletool.jar build-bundle --modules=module.zip --output=app.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: converted-app-aab
          path: app.aab

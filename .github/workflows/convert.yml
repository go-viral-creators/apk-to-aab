name: APK to AAB Converter (Working)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y wget unzip zip aapt2

      - name: Download APK
        run: |
          wget -O app.apk https://github.com/go-viral-creators/apk-to-aab/releases/download/v1/app.apk

      - name: Download Bundletool
        run: |
          wget -O bundletool.jar https://github.com/google/bundletool/releases/download/1.17.2/bundletool-all-1.17.2.jar

      - name: Extract APK Contents
        run: |
          # APK ko unzip karo
          unzip app.apk -d apk_contents
          
          # Check karo ki files sahi se extract hui
          ls -la apk_contents/

      - name: Get Android SDK Version
        id: sdk
        run: |
          # AndroidManifest.xml se minSdkVersion nikaalo
          if [ -f "apk_contents/AndroidManifest.xml" ]; then
            # XML parse karo (simple grep se)
            minSdk=$(grep -o 'minSdkVersion="[0-9]*"' apk_contents/AndroidManifest.xml | grep -o '[0-9]*' || echo "21")
            targetSdk=$(grep -o 'targetSdkVersion="[0-9]*"' apk_contents/AndroidManifest.xml | grep -o '[0-9]*' || echo "33")
            versionCode=$(grep -o 'versionCode="[0-9]*"' apk_contents/AndroidManifest.xml | grep -o '[0-9]*' || echo "1")
            versionName=$(grep -o 'versionName="[^"]*"' apk_contents/AndroidManifest.xml | sed 's/versionName="//' | sed 's/"//' || echo "1.0")
            
            echo "minSdk=$minSdk" >> $GITHUB_OUTPUT
            echo "targetSdk=$targetSdk" >> $GITHUB_OUTPUT
            echo "versionCode=$versionCode" >> $GITHUB_OUTPUT
            echo "versionName=$versionName" >> $GITHUB_OUTPUT
          else
            echo "minSdk=21" >> $GITHUB_OUTPUT
            echo "targetSdk=33" >> $GITHUB_OUTPUT
            echo "versionCode=1" >> $GITHUB_OUTPUT
            echo "versionName=1.0" >> $GITHUB_OUTPUT
          fi

      - name: Convert resources.arsc to protobuf
        run: |
          # resources.arsc ko protobuf mein convert karo
          if [ -f "apk_contents/resources.arsc" ]; then
            aapt2 convert --output-format proto apk_contents/resources.arsc -o resources.pb
            echo "Resources converted successfully"
          else
            echo "resources.arsc not found, creating empty resources.pb"
            touch resources.pb
          fi

      - name: Create AAB Structure
        run: |
          # Base directory banao
          mkdir -p base/manifest
          mkdir -p base/dex
          mkdir -p base/root
          mkdir -p base/res
          mkdir -p base/lib
          mkdir -p base/assets
          
          # Manifest copy karo
          if [ -f "apk_contents/AndroidManifest.xml" ]; then
            cp apk_contents/AndroidManifest.xml base/manifest/
          else
            echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><manifest xmlns:android=\"http://schemas.android.com/apk/res/android\" package=\"com.example.app\"></manifest>" > base/manifest/AndroidManifest.xml
          fi
          
          # Dex files copy karo
          cp apk_contents/*.dex base/dex/ 2>/dev/null || echo "No dex files found"
          
          # Resources copy karo
          if [ -d "apk_contents/res" ]; then
            cp -r apk_contents/res base/
          fi
          
          # Libs copy karo
          if [ -d "apk_contents/lib" ]; then
            cp -r apk_contents/lib base/
          fi
          
          # Assets copy karo
          if [ -d "apk_contents/assets" ]; then
            cp -r apk_contents/assets base/
          fi
          
          # Converted resources.pb root mein daalo
          if [ -f "resources.pb" ]; then
            cp resources.pb base/root/
          fi
          
          # Baki files root mein daalo (except jo already copy ho chuki hain)
          for file in apk_contents/*; do
            filename=$(basename "$file")
            if [ ! -d "$file" ] && [ "$filename" != "AndroidManifest.xml" ] && [[ "$filename" != *.dex ]] && [ "$filename" != "resources.arsc" ] && [ "$filename" != "res" ] && [ "$filename" != "lib" ] && [ "$filename" != "assets" ]; then
              cp "$file" base/root/ 2>/dev/null || true
            fi
          done
          
          # Directory structure check karo
          echo "Base directory structure:"
          find base -type f | head -20

      - name: Create Module ZIP
        run: |
          cd base
          zip -r ../module.zip ./*
          cd ..
          ls -la module.zip

      - name: Build AAB
        run: |
          java -jar bundletool.jar build-bundle \
            --modules=module.zip \
            --output=app.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: app.aab

name: AAB to APK Converter (Working)

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Direct URL of AAB file'
        required: true
        type: string
      mode:
        description: 'Conversion mode'
        required: false
        default: 'aab-to-apk'
        type: string
jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install bundletool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sdkmanager "build-tools;34.0.0"
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
          gh release download --repo google/bundletool --pattern "bundletool-all-*.jar" --output bundletool.jar --clobber

      - name: Download AAB from GitHub Artifact
        if: ${{ github.event.inputs.file_url != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_URL="${{ github.event.inputs.file_url }}"
          echo "🔗 Processing URL: $ARTIFACT_URL"
          
          # Try to extract artifact ID from different URL patterns
          if [[ $ARTIFACT_URL =~ artifacts/([0-9]+) ]]; then
            ARTIFACT_ID="${BASH_REMATCH[1]}"
            echo "✅ Found artifact ID: $ARTIFACT_ID"
            
            # Download using GitHub API
            gh api -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" \
              > artifact.zip
              
            unzip -o artifact.zip
            AAB_FILE=$(find . -name "*.aab" -print -quit)
            
            if [ -n "$AAB_FILE" ]; then
              mv "$AAB_FILE" input.aab
              echo "✅ AAB file ready: input.aab"
            else
              echo "❌ No AAB file found in artifact!"
              ls -la
              exit 1
            fi
          else
            # Try direct download with token (if it's a raw URL)
            wget --header="Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "$ARTIFACT_URL" -O input.aab || {
              echo "❌ Direct download failed, trying as zip..."
              wget --header="Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "$ARTIFACT_URL" -O artifact.zip && unzip -o artifact.zip
              AAB_FILE=$(find . -name "*.aab" -print -quit)
              [ -n "$AAB_FILE" ] && mv "$AAB_FILE" input.aab
            }
          fi
          
          if [ ! -f input.aab ]; then
            echo "❌ Failed to get AAB file!"
            exit 1
          fi

      - name: Download AAB from Artifact (Legacy)
        if: ${{ github.event.inputs.use_artifact == 'yes' && github.event.inputs.file_url == '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Previous artifact download logic here (pehle wala code)

      - name: Generate Universal APK from AAB
        run: |
          echo "🔄 Generating APKs from AAB..."
          java -jar bundletool.jar build-apks --bundle=input.aab --output=app.apks --mode=universal
          echo "📦 Extracting universal APK..."
          unzip -o app.apks -d apks_output
          cp apks_output/universal.apk app-universal.apk 2>/dev/null || \
            find apks_output -name "*.apk" -exec cp {} app-universal.apk \; -quit
          echo "✅ Universal APK created: app-universal.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: converted-apk
          path: app-universal.apk
          archive: false

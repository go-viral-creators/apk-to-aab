name: AAB to APK Converter (Working)

on:
  workflow_dispatch:
    inputs:
      aab_url:
        description: 'Direct download URL of AAB file (optional)'
        required: false
        default: ''
      use_artifact:
        description: 'Use AAB from previous workflow artifact? (yes/no)'
        required: true
        default: 'no'

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install bundletool (Working Method from convert.yml)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sdkmanager "build-tools;34.0.0"
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
          gh release download --repo google/bundletool --pattern "bundletool-all-*.jar" --output bundletool.jar --clobber

      - name: Download AAB
        run: |
          if [ "${{ github.event.inputs.use_artifact }}" = "yes" ]; then
            # Download artifact from previous run
            gh run download --name converted-aab-file --repo ${{ github.repository }} || true
            # Find any .aab file in current directory
            AAB_FILE=$(find . -maxdepth 1 -name "*.aab" -print -quit)
            if [ -n "$AAB_FILE" ]; then
              mv "$AAB_FILE" input.aab
              echo "Artifact AAB found and renamed to input.aab"
            else
              echo "No AAB file found in artifact!"
              exit 1
            fi
          elif [ -n "${{ github.event.inputs.aab_url }}" ]; then
            wget "${{ github.event.inputs.aab_url }}" -O input.aab
          else
            echo "No AAB source provided. Please provide URL or use artifact."
            exit 1
          fi

      - name: Generate Universal APK from AAB
        run: |
          # Generate APK set (universal mode means single APK for all devices)
          java -jar bundletool.jar build-apks --bundle=input.aab --output=app.apks --mode=universal
          # Extract universal APK from the .apks archive
          unzip -o app.apks -d apks_output
          # Copy universal.apk (name might vary, try to find it)
          find apks_output -name "*.apk" -exec cp {} app-universal.apk \; -quit

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-apk
          path: app-universal.apk
